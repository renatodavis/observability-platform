services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: observ-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-observ}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-observ}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: observ-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: observ-kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  api:
    build:
      context: ./api
    container_name: observ-api
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-observ}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-observ}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      API_DATABASE_URL: sqlite:////data/app.db
      API_CORS_ORIGINS: "http://localhost:5173,http://localhost:8080"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - api_data:/data

  worker:
    build:
      context: ./worker
    container_name: observ-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-observ}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-observ}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      API_URL: http://api:8000
      WORKER_PREFETCH: "32"
      WORKER_POLL_INTERVAL_SECONDS: "10"
      WORKER_MAX_RETRIES: "3"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: observ-frontend
    depends_on:
      - api
    ports:
      - "5173:80"

  simulator:
    build:
      context: ./simulator
    container_name: observ-simulator
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: ${RABBITMQ_USER:-observ}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-observ}
      API_URL: http://api:8000
      SIMULATOR_INTERVAL_SECONDS: "1"
    profiles: ["demo"]
    restart: unless-stopped

volumes:
  rabbitmq_data:
  es_data:
  api_data:
