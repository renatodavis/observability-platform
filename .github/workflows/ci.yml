name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint
        working-directory: api
        run: ruff check .
      - name: Import check
        working-directory: api
        run: python -c "from app.main import create_app; create_app()"

  worker:
    name: Worker (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: worker
        run: |
          python -m pip install --upgrade pip
          pip install . ruff
      - name: Lint
        working-directory: worker
        run: ruff check .
      - name: Import check
        working-directory: worker
        run: python -c "import worker"

  frontend:
    name: Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Build
        working-directory: frontend
        run: npm run build
